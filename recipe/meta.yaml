{% set name = "py-cordex" %}
{% set version = "0.10.5" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 868b1a0a30019e6a465e2b0d6af3dd8e9ee70d3fe92bda3fd79590545e7b95c9

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools_scm

  run:
    - python >={{ python_min }}
    - numpy >=1.17
    - pooch >=1.0
    - xarray >=0.15, !=2023.9.0
    - cf_xarray >=0.8
    - pyproj >=3.3.0
    - setuptools >=40.4

test:
  imports:
    - cordex
  requires:
    - pytest
    - python {{ python_min }}

about:
  home: https://github.com/euro-cordex/py-cordex
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: creation of cordex grids
  doc_url: https://py-cordex.readthedocs.io
  dev_url: https://github.com/euro-cordex/py-cordex

extra:
  recipe-maintainers:
    - larsbuntemeyer
